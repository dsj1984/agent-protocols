name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket ID (Epic or Story number)'
        required: true
      gate:
        description: 'Sprint Lifecycle Gate'
        required: true
        type: choice
        options:
          - gate1
          - gate2
          - gate3
          - gate4
      base_branch:
        description: 'Base branch for comparison'
        required: false
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Dependency Vulnerability Audit (SCA)
        run: npm audit --audit-level=high

      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --debug --only-verified

      - name: Lint and Format
        run: |
          npm run lint
          npm run format:check

      - name: Maintainability Check
        run: npm run maintainability:check

      - name: Run Tests
        run: npm test

  check-changes:
    name: Check for Changes
    runs-on: ubuntu-latest
    outputs:
      agents_changed: ${{ steps.filter.outputs.agents }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for Agent Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            agents:
              - '.agents/**'
              - '.github/workflows/ci.yml'

  audit-orchestration:
    name: Sprint Audit Orchestration
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Run Audit Orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node .agents/scripts/audit-orchestrator.js --ticket "${{ github.event.inputs.ticket_id }}" --gate "${{ github.event.inputs.gate }}" --base-branch "${{ github.event.inputs.base_branch || 'main' }}"

  handle-approval:
    name: Handle Approval Comment
    if: |
      github.event_name == 'issue_comment' &&
      (startsWith(github.event.comment.body, '/approve') || startsWith(github.event.comment.body, '/approve-audit-fixes')) &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Handle Approval
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .agents/scripts/handle-approval.js --ticket "${{ github.event.issue.number }}" --comment "${{ github.event.comment.body }}"

  publish:
    name: Publish to Dist
    needs: [validate, check-changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-changes.outputs.agents_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Dist Branch
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

          # Capture the contents of .agents/ from main into a temp dir
          mkdir /tmp/instructions-dist
          cp -r .agents/. /tmp/instructions-dist/

          # Switch to dist branch and clear it
          git checkout dist
          git rm -rf . --quiet

          # Copy the contents of .agents/ to the root of dist.
          # Consumers who add this branch as a submodule at .agents/
          # will get: .agents/README.md, .agents/instructions.md, .agents/skills/, etc.
          cp -r /tmp/instructions-dist/. .

          # Stage everything
          git add .

          # Validate that the expected dist structure is present before pushing
          echo "Validating dist contents..."
          test -f instructions.md \
            && test -f VERSION \
            && test -f default-agentrc.json \
            && test -d personas \
            && test -d rules \
            && test -d skills \
            && test -d workflows \
            && echo "Dist structure OK" \
            || { echo "ERROR: Dist validation failed — missing required files"; exit 1; }

          # Commit and push if there are changes
          if [[ -n $(git status -s) ]]; then
            git commit -m "Auto-update from main [skip ci]"
            git push origin dist
          else
            echo "No changes to deploy"
          fi
