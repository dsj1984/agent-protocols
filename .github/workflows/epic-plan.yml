name: Epic Plan

on:
  issues:
    labeled:

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  plan:
    name: Remote Plan Phase
    if: >
      github.event.label.name == 'agent::planning' ||
      github.event.label.name == 'agent::decomposing'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Validate Epic issue and resolve phase
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const label = context.payload.label?.name;
            const labels = (issue.labels || []).map((l) => l.name);

            // Map the triggering label to the plan phase slug consumed by
            // remote-bootstrap.js --phase.
            const LABEL_TO_PHASE = {
              'agent::planning': 'spec',
              'agent::decomposing': 'decompose',
            };
            const phase = LABEL_TO_PHASE[label];
            if (!phase) {
              core.setFailed(`Unexpected triggering label: ${label}`);
              return;
            }

            async function refuse(message) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: label,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `⚠️ epic-plan refused: ${message}. \`${label}\` has been removed.`,
              });
              core.setFailed(message);
            }

            if (issue.state !== 'open') {
              await refuse(`issue #${issue.number} is not open (state=${issue.state})`);
              return;
            }
            if (!labels.includes('type::epic')) {
              await refuse(`issue #${issue.number} is not \`type::epic\``);
              return;
            }
            if (!issue.body || !issue.body.trim()) {
              await refuse(`Epic #${issue.number} has an empty body`);
              return;
            }

            core.setOutput('epic_id', String(issue.number));
            core.setOutput('phase', phase);

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Materialize .mcp.json from secret
        env:
          MCP_JSON: ${{ secrets.MCP_JSON }}
        run: |
          if [ -z "$MCP_JSON" ]; then
            echo "::error::MCP_JSON secret is empty — refusing to plan without the agent-protocols MCP config."
            exit 1
          fi
          printf '%s' "$MCP_JSON" > .mcp.json
          chmod 600 .mcp.json
          echo "[epic-plan] .mcp.json written (mode 0600)."

      - name: Materialize .env from secret (optional)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE" ]; then
            echo "[epic-plan] No ENV_FILE secret — skipping .env."
          else
            printf '%s' "$ENV_FILE" > .env
            chmod 600 .env
            echo "[epic-plan] .env written (mode 0600)."
          fi

      - name: Sync slash commands from workflows
        run: npm run sync:commands

      - name: Fire Claude planner
        id: trigger
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: >-
            ${{ steps.validate.outputs.phase == 'spec' && format('/sprint-plan-spec {0}', steps.validate.outputs.epic_id) || format('/sprint-plan-decompose {0}', steps.validate.outputs.epic_id) }}
          # Same justification as epic-dispatch.yml: the planner needs Bash,
          # Agent, Edit, and MCP tools in a headless run with no human to
          # approve prompts. Defense-in-depth is (a) ephemeral runner
          # workspace, (b) repo-scoped GITHUB_TOKEN, (c) branch protection
          # on `main`.
          claude_args: --permission-mode bypassPermissions
          show_full_output: true

      - name: Post plan-phase confirmation
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const epicId = '${{ steps.validate.outputs.epic_id }}';
            const phase = '${{ steps.validate.outputs.phase }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(epicId),
              body: `🧭 Remote planner completed phase \`${phase}\` at ${new Date().toISOString()}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
