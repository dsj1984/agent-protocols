name: Issue Comment Handler

on:
  issue_comment:
    types: [created]

jobs:
  handle-approval:
    name: Handle Approval Comment
    if: startsWith(github.event.comment.body, '/approve') && github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Handle Approval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}  # Added in case Provider also requires generic API access
        run: node .agents/scripts/handle-approval.js --ticket "${{ github.event.issue.number }}" --comment "${{ github.event.comment.body }}"
