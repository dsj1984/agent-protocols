name: Baseline Refresh Guardrail

# Anti-gaming gate. Re-runs `check-crap` with thresholds read from the **base
# branch** `.agentrc.json`, enforces that any PR that touches a committed
# baseline carries a justified `baseline-refresh:` commit, and auto-labels
# baseline-only PRs with `review::baseline-refresh` so a human sees every
# baseline change even on green CI.
#
# Triggered exclusively on `pull_request` events — the base-branch/PR-branch
# comparison is meaningless on push-to-main. The sibling `ci.yml` workflow
# handles the full-repo gate on main.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrail:
    name: Baseline refresh guardrail
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 ensures `git log origin/<base>..HEAD` can see every
          # commit introduced by the PR — the refresh-tag check depends on it.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Run Tests with Coverage
        # `check-crap` needs per-method coverage to score new/regressed
        # methods. The base-enforced re-run inherits the coverage artifact
        # produced here.
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee test-output.txt

      - name: Baseline refresh guardrail
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node .agents/scripts/baseline-refresh-guardrail.js \
            --base-ref origin/${{ github.base_ref }} \
            --pr-number ${{ github.event.pull_request.number }}
