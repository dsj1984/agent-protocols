name: Publish Dist
on:
  push:
    branches: [ main ]
    paths:
      - '.agents/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Dist Branch
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

          # Capture the contents of .agents/ from main into a temp dir
          mkdir /tmp/instructions-dist
          cp -r .agents/. /tmp/instructions-dist/

          # Switch to dist branch and clear it
          git checkout dist
          git rm -rf . --quiet

          # Copy the contents of .agents/ to the root of dist.
          # Consumers who add this branch as a submodule at .agents/
          # will get: .agents/README.md, .agents/instructions.md, .agents/skills/, etc.
          cp -r /tmp/instructions-dist/. .

          # Stage everything
          git add .

          # Validate that the expected dist structure is present before pushing
          echo "Validating dist contents..."
          test -f instructions.md \
            && test -f system-prompt.md \
            && test -f VERSION \
            && test -d personas \
            && test -d skills \
            && test -d workflows \
            && echo "Dist structure OK" \
            || { echo "ERROR: Dist validation failed — missing required files"; exit 1; }

          # Commit and push if there are changes
          if [[ -n $(git status -s) ]]; then
            git commit -m "Auto-update from main"
            git push origin dist
          else
            echo "No changes to deploy"
          fi