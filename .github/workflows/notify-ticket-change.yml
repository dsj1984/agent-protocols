name: Ticket Change Notifications

on:
  issues:
    types: [labeled, unlabeled, opened, closed, reopened]

permissions:
  issues: write
  contents: read

jobs:
  notify:
    name: Notify on Epic/Feature/Story change
    # Fire only for Epic, Feature, and Story tickets (not Tasks or context issues).
    if: |
      contains(github.event.issue.labels.*.name, 'type::epic') ||
      contains(github.event.issue.labels.*.name, 'type::feature') ||
      contains(github.event.issue.labels.*.name, 'type::story')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .agentrc.json only
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .agentrc.json
          sparse-checkout-cone-mode: false

      - name: Resolve notification config
        id: config
        env:
          # MCP_JSON is the canonical source of NOTIFICATION_WEBHOOK_URL
          # (configured on the agent-protocols MCP server's `env` block).
          MCP_JSON: ${{ secrets.MCP_JSON }}
        run: |
          LEVEL=$(jq -r '.orchestration.notifications.level // "verbose"' .agentrc.json 2>/dev/null || echo "verbose")
          POST_COMMENT=$(jq -r '.orchestration.notifications.postToEpic // "true"' .agentrc.json 2>/dev/null || echo "true")

          # Webhook resolution priority: MCP_JSON (canonical) → .agentrc.json override.
          WEBHOOK=""
          if [ -n "$MCP_JSON" ]; then
            WEBHOOK=$(printf '%s' "$MCP_JSON" | \
              jq -r '.mcpServers["agent-protocols"].env.NOTIFICATION_WEBHOOK_URL // ""' 2>/dev/null || true)
          fi
          if [ -z "$WEBHOOK" ]; then
            WEBHOOK=$(jq -r '.orchestration.notifications.webhookUrl // ""' .agentrc.json 2>/dev/null || true)
          fi

          echo "level=$LEVEL"              >> "$GITHUB_OUTPUT"
          echo "webhook=$WEBHOOK"          >> "$GITHUB_OUTPUT"
          echo "post_comment=$POST_COMMENT" >> "$GITHUB_OUTPUT"
          echo "[notify] level=$LEVEL · webhook=${WEBHOOK:+configured (len=${#WEBHOOK})}${WEBHOOK:-none} · post_to_epic=$POST_COMMENT"

      - name: Decide whether to fire
        id: gate
        env:
          LEVEL: ${{ steps.config.outputs.level }}
          ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          FIRE=0
          case "$LEVEL" in
            off)
              FIRE=0 ;;
            minimal)
              case "$ACTION" in opened|closed) FIRE=1 ;; esac ;;
            default)
              case "$ACTION" in
                opened|closed|reopened) FIRE=1 ;;
                labeled|unlabeled)
                  case "$LABEL_NAME" in agent::*) FIRE=1 ;; esac ;;
              esac ;;
            verbose|*)
              FIRE=1 ;;
          esac
          echo "fire=$FIRE" >> "$GITHUB_OUTPUT"
          echo "[notify] action=$ACTION label=${LABEL_NAME:-n/a} level=$LEVEL → fire=$FIRE"

      - name: Compose summary
        id: summary
        if: steps.gate.outputs.fire == '1'
        env:
          ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_STATE: ${{ github.event.issue.state }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJSON(github.event.issue.labels) }}
          SENDER: ${{ github.event.sender.login }}
          TIMESTAMP: ${{ github.event.issue.updated_at }}
        run: |
          # Derive ticket type
          TYPE=$(printf '%s' "$ISSUE_LABELS" | jq -r 'map(.name) | map(select(startswith("type::"))) | .[0] // "type::unknown"')
          TYPE_SHORT=${TYPE#type::}

          # Find parent Epic — the Epic itself or derived from body ("Epic: #NNN")
          if [ "$TYPE" = "type::epic" ]; then
            EPIC_ID="$ISSUE_NUMBER"
          else
            EPIC_ID=$(printf '%s' "$ISSUE_BODY" | grep -oiE 'Epic:\s*#[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
          fi

          # Compose line
          case "$ACTION" in
            labeled)    VERB="🏷️  labeled \`$LABEL_NAME\`" ;;
            unlabeled)  VERB="🧹 unlabeled \`$LABEL_NAME\`" ;;
            opened)     VERB="🆕 opened" ;;
            closed)     VERB="✅ closed" ;;
            reopened)   VERB="♻️  reopened" ;;
            *)          VERB="· $ACTION" ;;
          esac

          LINE="$VERB · **$TYPE_SHORT** [#$ISSUE_NUMBER]($ISSUE_URL) · _by @$SENDER at $TIMESTAMP_"
          echo "epic_id=${EPIC_ID:-}" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE_SHORT"     >> "$GITHUB_OUTPUT"
          {
            echo "line<<EOF"
            echo "$LINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Always write to the job summary for inspection
          {
            echo "### 📬 Ticket change"
            echo ""
            echo "- Event: \`$ACTION\`"
            echo "- Label: \`${LABEL_NAME:-n/a}\`"
            echo "- Type: \`$TYPE\`"
            echo "- Issue: [#$ISSUE_NUMBER]($ISSUE_URL) — $ISSUE_TITLE"
            echo "- State: \`$ISSUE_STATE\`"
            echo "- Parent Epic: \`#${EPIC_ID:-unknown}\`"
            echo "- Sender: @$SENDER"
            echo "- Timestamp: $TIMESTAMP"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post comment on parent Epic
        if: |
          steps.gate.outputs.fire == '1' &&
          steps.config.outputs.post_comment == 'true' &&
          steps.summary.outputs.epic_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EPIC_ID: ${{ steps.summary.outputs.epic_id }}
          LINE: ${{ steps.summary.outputs.line }}
        run: |
          # Post a single concise comment; let GitHub native subscriptions do the
          # email fan-out. Keeps one thread per Epic showing all lifecycle events.
          jq -n --arg body "$LINE" '{body: $body}' | \
            gh api --method POST \
              "repos/${{ github.repository }}/issues/$EPIC_ID/comments" \
              --input - >/dev/null && \
            echo "[notify] posted comment on Epic #$EPIC_ID" || \
            echo "[notify] comment post failed (non-blocking)"

      - name: Fire webhook
        if: |
          steps.gate.outputs.fire == '1' &&
          steps.config.outputs.webhook != ''
        env:
          WEBHOOK: ${{ steps.config.outputs.webhook }}
          EVENT: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_STATE: ${{ github.event.issue.state }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          REPO: ${{ github.repository }}
          SENDER: ${{ github.event.sender.login }}
          TIMESTAMP: ${{ github.event.issue.updated_at }}
          TYPE_SHORT: ${{ steps.summary.outputs.type }}
          EPIC_ID: ${{ steps.summary.outputs.epic_id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg event       "$EVENT" \
            --arg label       "$LABEL_NAME" \
            --arg repo        "$REPO" \
            --arg sender      "$SENDER" \
            --arg timestamp   "$TIMESTAMP" \
            --arg type        "$TYPE_SHORT" \
            --arg epic_id     "$EPIC_ID" \
            --argjson number  "$ISSUE_NUMBER" \
            --arg title       "$ISSUE_TITLE" \
            --arg state       "$ISSUE_STATE" \
            --arg url         "$ISSUE_URL" \
            '{event: $event, label: $label, repo: $repo, sender: $sender, timestamp: $timestamp,
              issue: {number: $number, title: $title, state: $state, url: $url, type: $type, epicId: ($epic_id | select(length > 0) | tonumber // null)}}')
          curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK" \
            && echo "[notify] webhook delivered" \
            || echo "[notify] webhook post failed (non-blocking)"
