name: Epic Dispatch

on:
  issues:
    labeled:

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  dispatch:
    name: Dispatch Remote Orchestrator
    if: github.event.label.name == 'agent::dispatching'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Validate Epic issue
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map((l) => l.name);

            if (issue.state !== 'open') {
              core.setFailed(`Issue #${issue.number} is not open (state=${issue.state}).`);
              return;
            }
            if (!labels.includes('type::epic')) {
              core.setFailed(`Issue #${issue.number} is not type::epic — refusing to dispatch.`);
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'agent::dispatching',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '⚠️ epic-dispatch refused: issue is not `type::epic`. `agent::dispatching` has been removed.',
              });
              return;
            }
            if (!issue.body || !issue.body.trim()) {
              core.setFailed(`Epic #${issue.number} has an empty body.`);
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'agent::dispatching',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '⚠️ epic-dispatch refused: Epic body is empty. `agent::dispatching` has been removed.',
              });
              return;
            }

            const autoClose = labels.includes('epic::auto-close');
            core.setOutput('epic_id', String(issue.number));
            core.setOutput('auto_close', autoClose ? '1' : '0');

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Materialize .mcp.json from secret
        env:
          MCP_JSON: ${{ secrets.MCP_JSON }}
        run: |
          if [ -z "$MCP_JSON" ]; then
            echo "::error::MCP_JSON secret is empty — refusing to dispatch without the agent-protocols MCP config."
            exit 1
          fi
          printf '%s' "$MCP_JSON" > .mcp.json
          chmod 600 .mcp.json
          echo "[epic-dispatch] .mcp.json written (mode 0600)."

      - name: Materialize .env from secret (optional)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE" ]; then
            echo "[epic-dispatch] No ENV_FILE secret — skipping .env."
          else
            printf '%s' "$ENV_FILE" > .env
            chmod 600 .env
            echo "[epic-dispatch] .env written (mode 0600)."
          fi

      - name: Sync slash commands from workflows
        run: npm run sync:commands

      - name: Fire Claude orchestrator
        id: trigger
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: /sprint-execute-epic ${{ steps.validate.outputs.epic_id }}
          # Bypass interactive permission prompts — the orchestrator needs
          # Bash, Agent, Edit, MCP, and many more tools, and there is no
          # human to approve them in a headless run. Safe in this context
          # because (a) the runner workspace is ephemeral, (b) GITHUB_TOKEN
          # only has issue/content/PR write on this repo, (c) branch
          # protection on `main` is the destructive-action backstop.
          claude_args: --permission-mode bypassPermissions
          show_full_output: true

      - name: Post dispatch confirmation
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const epicId = '${{ steps.validate.outputs.epic_id }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(epicId),
              body: `🚀 Remote orchestrator completed dispatch at ${new Date().toISOString()}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
