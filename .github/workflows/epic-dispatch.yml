name: Epic Dispatch

on:
  issues:
    labeled:

permissions:
  issues: write
  contents: read

jobs:
  dispatch:
    name: Dispatch Remote Orchestrator
    if: github.event.label.name == 'agent::dispatching'
    runs-on: ubuntu-latest
    steps:
      - name: Validate Epic issue
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map((l) => l.name);

            if (issue.state !== 'open') {
              core.setFailed(`Issue #${issue.number} is not open (state=${issue.state}).`);
              return;
            }
            if (!labels.includes('type::epic')) {
              core.setFailed(`Issue #${issue.number} is not type::epic — refusing to dispatch.`);
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'agent::dispatching',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '⚠️ epic-dispatch refused: issue is not `type::epic`. `agent::dispatching` has been removed.',
              });
              return;
            }
            if (!issue.body || !issue.body.trim()) {
              core.setFailed(`Epic #${issue.number} has an empty body.`);
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'agent::dispatching',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '⚠️ epic-dispatch refused: Epic body is empty. `agent::dispatching` has been removed.',
              });
              return;
            }

            const autoClose = labels.includes('epic::auto-close');
            core.setOutput('epic_id', String(issue.number));
            core.setOutput('auto_close', autoClose ? '1' : '0');

      - name: Fire RemoteTrigger
        id: trigger
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            /sprint-execute-epic ${{ steps.validate.outputs.epic_id }}
          env_vars: |
            ENV_FILE=${{ secrets.ENV_FILE }}
            MCP_JSON=${{ secrets.MCP_JSON }}
            EPIC_ID=${{ steps.validate.outputs.epic_id }}
            EPIC_AUTO_CLOSE=${{ steps.validate.outputs.auto_close }}

      - name: Post dispatch confirmation
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const epicId = '${{ steps.validate.outputs.epic_id }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(epicId),
              body: `🚀 Remote orchestrator dispatched at ${new Date().toISOString()}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
