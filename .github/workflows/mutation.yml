name: Mutation Testing

on:
  # Run every Sunday at 03:00 UTC
  schedule:
    - cron: '0 3 * * 0'
  # Allow manual triggering from the Actions UI
  workflow_dispatch:
    inputs:
      files:
        description: 'Glob pattern to restrict which source files to mutate (optional)'
        required: false
        default: ''

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutate:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Run Mutation Tests
        # Always exit 0 so the workflow succeeds even when the mutation score
        # is below threshold; the report artifact tells the full story.
        run: npm run mutate:ci || true
        env:
          # Prevent any Stryker telemetry pings
          STRYKER_DISABLE_TELEMETRY: '1'

      - name: Upload Mutation Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 30

      - name: Print Score Summary
        if: always()
        run: |
          REPORT="reports/mutation/mutation.json"
          if [ -f "$REPORT" ]; then
            node - <<'EOF'
          import { readFileSync } from 'fs';
          const r = JSON.parse(readFileSync('reports/mutation/mutation.json', 'utf8'));
          const m = r.mutationScore ?? r.results?.mutationScore ?? 'unknown';
          const killed  = r.killed  ?? '?';
          const survived = r.survived ?? '?';
          const total   = r.total   ?? '?';
          console.log(`\n📊 Mutation Score : ${m}%`);
          console.log(`   Killed         : ${killed}`);
          console.log(`   Survived       : ${survived}`);
          console.log(`   Total mutants  : ${total}\n`);
          EOF
          else
            echo "No mutation report found — Stryker may have failed before writing output."
          fi
